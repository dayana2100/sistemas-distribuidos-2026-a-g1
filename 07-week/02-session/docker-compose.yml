name: ddd-architecture-demo

x-placeholder-service: &placeholder-service
  build:
    context: ./infra/pedagogic-service
  restart: unless-stopped
  networks:
    - ddd-demo

x-front-service: &front-service
  image: nginx:alpine
  restart: unless-stopped
  volumes:
    - ./index.html:/usr/share/nginx/html/index.html:ro
    - ./css:/usr/share/nginx/html/css:ro
    - ./js:/usr/share/nginx/html/js:ro
    - ./README.md:/usr/share/nginx/html/README.md:ro
    - ./docs:/usr/share/nginx/html/docs:ro
    - ./k8s:/usr/share/nginx/html/k8s:ro
  networks:
    - ddd-demo

services:
  front-main:
    <<: *front-service
    container_name: ddd-front-main
    ports:
      - "80:80"

  front-qa:
    <<: *front-service
    container_name: ddd-front-qa
    ports:
      - "81:80"

  front-dev:
    <<: *front-service
    container_name: ddd-front-dev
    ports:
      - "82:80"

  api-gateway-main:
    <<: *placeholder-service
    container_name: ddd-api-gateway-main
    ports:
      - "8000:80"
    environment:
      SERVICE_NAME: API Gateway
      REPOSITORY_NAME: api-gateway
      ENVIRONMENT_NAME: main
      HOST_PORT: "8000"
      TECHNOLOGY_NAME: Punto unico de entrada
      ROLE_NAME: Enrutamiento y coordinacion
      SCENARIO_NAME: Microservicios separados por ambiente con una puerta de acceso comun.
      MODULE_SCOPE: Seguridad, Venta e Inventario del ambiente main.
      SUMMARY_TEXT: Aqui corre la representacion del gateway del ambiente main.
      EXTRA_NOTE: Debe recibir trafico del front-main y redirigirlo solo a micro-1-main, micro-2-main y micro-3-main.
      PORT_FAMILY: main 8000 | qa 8001 | dev 8002
      FRONT_PORT: "80"

  api-gateway-qa:
    <<: *placeholder-service
    container_name: ddd-api-gateway-qa
    ports:
      - "8001:80"
    environment:
      SERVICE_NAME: API Gateway
      REPOSITORY_NAME: api-gateway
      ENVIRONMENT_NAME: qa
      HOST_PORT: "8001"
      TECHNOLOGY_NAME: Punto unico de entrada
      ROLE_NAME: Enrutamiento y coordinacion
      SCENARIO_NAME: Microservicios separados por ambiente con una puerta de acceso comun.
      MODULE_SCOPE: Seguridad, Venta e Inventario del ambiente qa.
      SUMMARY_TEXT: Aqui corre la representacion del gateway del ambiente qa.
      EXTRA_NOTE: Debe recibir trafico del front-qa y redirigirlo solo a micro-1-qa, micro-2-qa y micro-3-qa.
      PORT_FAMILY: main 8000 | qa 8001 | dev 8002
      FRONT_PORT: "81"

  api-gateway-dev:
    <<: *placeholder-service
    container_name: ddd-api-gateway-dev
    ports:
      - "8002:80"
    environment:
      SERVICE_NAME: API Gateway
      REPOSITORY_NAME: api-gateway
      ENVIRONMENT_NAME: dev
      HOST_PORT: "8002"
      TECHNOLOGY_NAME: Punto unico de entrada
      ROLE_NAME: Enrutamiento y coordinacion
      SCENARIO_NAME: Microservicios separados por ambiente con una puerta de acceso comun.
      MODULE_SCOPE: Seguridad, Venta e Inventario del ambiente dev.
      SUMMARY_TEXT: Aqui corre la representacion del gateway del ambiente dev.
      EXTRA_NOTE: Debe recibir trafico del front-dev y redirigirlo solo a micro-1-dev, micro-2-dev y micro-3-dev.
      PORT_FAMILY: main 8000 | qa 8001 | dev 8002
      FRONT_PORT: "82"

  micro-1-main:
    <<: *placeholder-service
    container_name: ddd-micro-1-main
    ports:
      - "8080:80"
    environment:
      SERVICE_NAME: micro-1
      REPOSITORY_NAME: micro-1
      ENVIRONMENT_NAME: main
      HOST_PORT: "8080"
      TECHNOLOGY_NAME: Spring Boot
      ROLE_NAME: Dominio Seguridad
      SCENARIO_NAME: Microservicio dedicado al bounded context Seguridad.
      MODULE_SCOPE: Usuarios, roles, permisos y JWT.
      SUMMARY_TEXT: Aqui corre la representacion del servicio Seguridad en ambiente main.
      EXTRA_NOTE: Este puerto solo muestra identidad del servicio; no expone endpoints reales.
      PORT_FAMILY: main 8080 | qa 8081 | dev 8082
      FRONT_PORT: "80"

  micro-1-qa:
