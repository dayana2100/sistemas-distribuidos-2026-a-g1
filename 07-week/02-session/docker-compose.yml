      SCENARIO_NAME: Microservicio dedicado al bounded context Venta.
      MODULE_SCOPE: Pedidos, pagos, reglas comerciales y estados.
      SUMMARY_TEXT: Aqui corre la representacion del servicio Venta en ambiente main.
      EXTRA_NOTE: La idea es identificar rapido que este puerto pertenece al repo micro-2.
      PORT_FAMILY: main 9000 | qa 9001 | dev 9002
