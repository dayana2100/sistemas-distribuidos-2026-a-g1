      EXTRA_NOTE: Este puerto ya esta ocupado por otro contenedor en tu maquina. Solo levantalo si liberas 5434.
      PORT_FAMILY: main 5432 | qa 5433 | dev 5434
      FRONT_PORT: "82"

networks:
  ddd-demo:
    driver: bridge
